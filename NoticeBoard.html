<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Notice Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>
    /* STYLING FOR THE ADMISSION BAR (Within the list) */
    .admission-item {
        grid-column: 1 / -1; /* Makes it span full width in the board */
        background: #0f172a;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        align-items: center;
        height: 50px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .gold-badge {
        background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        color: #000;
        font-weight: 800;
        font-size: 11px;
        padding: 0 15px;
        height: 100%;
        display: flex;
        align-items: center;
        white-space: nowrap;
        text-transform: uppercase;
    }

    .admission-ticker {
        flex-grow: 1;
        overflow: hidden;
        white-space: nowrap;
        color: #f8fafc;
        font-size: 13px;
    }

    .admission-ticker span {
        display: inline-block;
        padding-left: 100%;
        animation: ticker-move 15s linear infinite;
    }

    @keyframes ticker-move {
        0% { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(-100%, 0, 0); }
    }

    .apply-now {
        background: #6366f1;
        color: white !important;
        text-decoration: none;
        font-size: 11px;
        font-weight: bold;
        padding: 8px 15px;
        border-radius: 8px;
        margin-right: 10px;
    }

    /* ORIGINAL BOARD STYLES */
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #eef2f7; }
    header { background: linear-gradient(45deg, #2980b9, #6dd5fa); color: white; text-align: center; padding: 20px; }
    .marquee { background: #f39c12; color: white; padding: 10px; overflow: hidden; white-space: nowrap; }
    .marquee span { display: inline-block; padding-left: 100%; animation: scroll 40s linear infinite;}
    @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
    .filters { text-align: center; margin: 15px; }
    .filters button { padding: 8px 15px; margin: 5px; border: none; border-radius: 20px; cursor: pointer; background: #ddd; }
    .filters button.active { background: #2980b9; color: white; }
    .board { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; width: 90%; margin: auto; }
    .card { padding: 15px; border-radius: 10px; color: white; position: relative; min-height: 80px;}
    .announcement { background: #3498db; }
    .holiday { background: #27ae60; }
    .event { background: #e74c3c; }
    .date { font-size: 12px; margin-top: 10px; }
    .tag { position: absolute; top: 10px; right: 10px; font-size: 10px; background: black; padding: 3px 6px; border-radius: 5px; }
</style>
</head>
<body>

<header>
    <h2>🏫 School Notice Board</h2>
</header>



<div class="filters">
    <button onclick="filterItems('all')" class="active">All</button>
    <button onclick="filterItems('announcement')">Announcements</button>
    <button onclick="filterItems('holiday')">Holidays</button>
    <button onclick="filterItems('event')">Events</button>
</div>

<div class="board" id="board"></div>

<br>
<br>
<div class="marquee">
    <span id="scrollText"></span>
</div>

<script>
// YOUR DATA
const notices = [
    { type: "announcement", text: "Admission Open", date: "2026-04-05" }, // Replaced Annual Day text here
    { type: "holiday", text: "Ambedkar Jayanti Holiday", date: "2026-04-14" },
    { type: "event", text: "Sports Day आयोजन", date: "2026-04-03" },
    { type: "announcement", text: "Exam Schedule Released", date: "2026-04-01" },
    { type: "event", text: "Science Exhibition", date: "2026-04-20" }
];

function render(filter = "all") {
    const board = document.getElementById("board");
    board.innerHTML = "";

    notices
    .filter(n => filter === "all" || n.type === filter)
    .forEach(n => {
        const div = document.createElement("div");

        // If the notice is "Admission Open", use the 1st code's premium style
        if (n.text === "Admission Open") {
            div.className = "admission-item";
            div.innerHTML = `
                <div class="gold-badge">Admissions 2026-27</div>
                <div class="admission-ticker">
                    <span>Limited Seats Available for Class 1st to 10th • Entrance Exam on April 15th • Scholarships Available • </span>
                </div>
                <a href="#" class="apply-now">APPLY NOW</a>
            `;
        } else {
            // Otherwise, use the standard card style from the 2nd code
            div.className = `card ${n.type}`;
            div.innerHTML = `
                <div class="tag">${n.type.toUpperCase()}</div>
                <h3>${n.text}</h3>
                <div class="date">📅 ${n.date}</div>
            `;
        }
        board.appendChild(div);
    });
}

function filterItems(type) {
    document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
    render(type);
}

document.getElementById("scrollText").innerText = notices.map(n => n.text).join("  |  ");
render();
</script>

</body>
</html>
